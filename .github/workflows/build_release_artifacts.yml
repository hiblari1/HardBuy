name: Build release artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  android_apk:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generate Android host project (fix unsupported Gradle layout)
        run: flutter create --platforms=android --project-name hardbuy --overwrite .

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: hardbuy-android-apk-${{ github.run_id }}-${{ github.run_attempt }}
          path: build/app/outputs/flutter-apk/app-release.apk
